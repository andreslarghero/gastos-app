<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gastos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Gastos</h1>
            <p class="muted">Controla tus gastos con estilo fintech</p>
          </div>
        </div>
        <div id="userBar" class="userbar" hidden>
          <span id="welcomeText" class="muted">Bienvenido, usuario</span>
          <button id="logoutBtn" class="btn-secondary" type="button">
            Cerrar sesión
          </button>
        </div>
      </header>
      <div id="appSection">
      <section class="hero card">
        <div class="hero-label">Total gastado</div>
        <div id="totalValue" class="hero-value">$0.00</div>
        <div class="hero-sub muted">Resumen actualizado en tiempo real</div>
      </section>

      <section class="grid">
        <section class="card">
          <div class="list-header">
            <h2>Gastos por categoría</h2>
            <button id="refreshBtn" class="btn-secondary" type="button">
              Actualizar
            </button>
          </div>
          <div class="chart-wrap">
            <canvas id="categoryChart" height="220"></canvas>
          </div>
        </section>

        <section class="card">
          <h2>Agregar gasto</h2>
          <form id="expenseForm" class="form">
            <label class="field">
              <span>Monto</span>
              <input
                id="amount"
                name="amount"
                type="number"
                step="0.01"
                min="0"
                placeholder="120.50"
                required
              />
            </label>

            <label class="field">
              <span>Categoría</span>
              <input
                id="category"
                name="category"
                type="text"
                maxlength="80"
                placeholder="comida, transporte, entretenimiento, otros…"
                required
              />
            </label>

            <label class="field field-full">
              <span>Descripción</span>
              <input
                id="description"
                name="description"
                type="text"
                maxlength="200"
                placeholder="Ej. comida con amigos"
                required
              />
            </label>

            <div class="actions">
              <button id="submitBtn" type="submit">Agregar gasto</button>
              <span id="status" class="status muted" aria-live="polite"></span>
            </div>
          </form>
        </section>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Todos los gastos</h2>
        </div>
        <ul id="expensesList" class="list" aria-live="polite"></ul>
        <div id="emptyState" class="empty muted" hidden>
          Aún no hay gastos. Agrega tu primero arriba.
        </div>
      </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
